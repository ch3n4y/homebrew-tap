name: Auto Update EasyTier

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-easytier
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest_version="$(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/EasyTier/EasyTier/releases/latest |
            jq -r '.tag_name | sub("^v"; "")')"

          current_version="$(grep -Eo 'easytier-macos-aarch64-v[0-9]+(\.[0-9]+)+\.zip' Formula/easytier.rb |
            head -n 1 |
            sed -E 's/.*-v([0-9]+(\.[0-9]+)+)\.zip/\1/')"

          echo "Latest version: ${latest_version}"
          echo "Current version: ${current_version}"

          if [[ -z "${latest_version}" || "${latest_version}" == "null" ]]; then
            echo "Could not determine latest version" >&2
            exit 1
          fi

          if [[ -z "${current_version}" ]]; then
            echo "Could not determine current formula version" >&2
            exit 1
          fi

          if [[ "${latest_version}" != "${current_version}" ]]; then
            {
              echo "has_update=true"
              echo "new_version=${latest_version}"
              echo "current_version=${current_version}"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "has_update=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download release files and calculate SHA256
        if: steps.check.outputs.has_update == 'true'
        id: sha256
        run: |
          set -euo pipefail

          version="${{ steps.check.outputs.new_version }}"
          arm64_url="https://github.com/EasyTier/EasyTier/releases/download/v${version}/easytier-macos-aarch64-v${version}.zip"
          x64_url="https://github.com/EasyTier/EasyTier/releases/download/v${version}/easytier-macos-x86_64-v${version}.zip"

          curl --fail --location --silent --show-error "${arm64_url}" --output arm64.zip &
          arm64_pid=$!
          curl --fail --location --silent --show-error "${x64_url}" --output x64.zip &
          x64_pid=$!

          wait "${arm64_pid}"
          wait "${x64_pid}"

          arm64_sha="$(shasum -a 256 arm64.zip | awk '{print $1}')"
          x64_sha="$(shasum -a 256 x64.zip | awk '{print $1}')"

          {
            echo "arm64_sha=${arm64_sha}"
            echo "x64_sha=${x64_sha}"
          } >> "${GITHUB_OUTPUT}"

          echo "ARM64 SHA256: ${arm64_sha}"
          echo "x64 SHA256: ${x64_sha}"

      - name: Update formula
        if: steps.check.outputs.has_update == 'true'
        run: |
          set -euo pipefail

          version="${{ steps.check.outputs.new_version }}"
          arm64_sha="${{ steps.sha256.outputs.arm64_sha }}"
          x64_sha="${{ steps.sha256.outputs.x64_sha }}"

          sed -i '' -E "s|releases/download/v[0-9]+(\.[0-9]+)+/easytier-macos-aarch64-v[0-9]+(\.[0-9]+)+\.zip|releases/download/v${version}/easytier-macos-aarch64-v${version}.zip|g" Formula/easytier.rb
          sed -i '' -E "s|releases/download/v[0-9]+(\.[0-9]+)+/easytier-macos-x86_64-v[0-9]+(\.[0-9]+)+\.zip|releases/download/v${version}/easytier-macos-x86_64-v${version}.zip|g" Formula/easytier.rb

          sed -i '' "/if Hardware::CPU.arm?/,/else/ s/sha256 \".*\"/sha256 \"${arm64_sha}\"/" Formula/easytier.rb
          sed -i '' "/else/,/^  end/ s/sha256 \".*\"/sha256 \"${x64_sha}\"/" Formula/easytier.rb

      - name: Verify formula
        if: steps.check.outputs.has_update == 'true'
        run: |
          set -euo pipefail

          ruby -c Formula/easytier.rb
          brew style Formula/easytier.rb
          git diff --check
          git diff -- Formula/easytier.rb

      - name: Commit and push changes
        if: steps.check.outputs.has_update == 'true'
        run: |
          set -euo pipefail

          version="${{ steps.check.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/easytier.rb

          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          git commit -m "chore: auto update easytier to v${version}" \
            -m "Update EasyTier formula URL and SHA256 hashes."
          git push

      - name: Create update summary
        if: steps.check.outputs.has_update == 'true'
        run: |
          {
            echo "## Updated EasyTier"
            echo ""
            echo "- From: v${{ steps.check.outputs.current_version }}"
            echo "- To: v${{ steps.check.outputs.new_version }}"
            echo "- ARM64 SHA256: \`${{ steps.sha256.outputs.arm64_sha }}\`"
            echo "- x64 SHA256: \`${{ steps.sha256.outputs.x64_sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Create no-update summary
        if: steps.check.outputs.has_update == 'false'
        run: |
          {
            echo "## No update needed"
            echo ""
            echo "EasyTier is already at the latest release."
          } >> "${GITHUB_STEP_SUMMARY}"
